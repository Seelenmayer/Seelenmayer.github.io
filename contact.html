				<h1>Contact</h1>
				<p>If you have an email client configured on your device, you can use the dynamically generated link below to message me directly.</p>
				<p class="contactemail" id="contact">The email link will appear in <span id="countdown">8</span> seconds.</p>
				<script>
					var name = 'Seelenmayer';
					var domain = 'live';
					var tld = 'com';
					// Display
					function generateEmail() {
						document.getElementById('contact').innerHTML = '<a href="mailto:' + name + '@' + domain + '.' + tld + '">' + name + '@' + domain + '.' + tld + '</a>';
					}
					// Countdown
					var countdownTime = 8;
					var countdownInterval = setInterval(function() {
						countdownTime--;
						document.getElementById('countdown').innerHTML = countdownTime;
						if (countdownTime <= 0) {
							clearInterval(countdownInterval);
							generateEmail();
						}
					}, 1000);
				</script>
